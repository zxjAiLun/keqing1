# keqingv3 预处理配置
# 运行：
#   uv run python scripts/preprocess_v3.py
# 覆盖目录：
#   uv run python scripts/preprocess_v3.py --output_dir processed_v3_debug
# 覆盖数据源：
#   uv run python scripts/preprocess_v3.py --data_dirs artifacts/converted_mjai/ds1

data_dirs:
  - artifacts/converted_mjai/ds1
  # - artifacts/converted_mjai/ds2

output_dir: processed_v3

# 预处理并行度
workers: 12
maxtasksperchild: 24

# 是否在预处理阶段直接做花色增强
augment: false

# v3 默认走终局回传 value target
value_strategy: mc_return

# 可选：只导出指定玩家视角
# actor_name_filter:
#   - "ⓝNAGA25"
