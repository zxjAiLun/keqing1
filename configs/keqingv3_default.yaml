# keqingv3 默认训练配置
# 预处理建议：
#   uv run python scripts/preprocess_v3.py --config configs/keqing_default.yaml --output_dir processed_v3
# 训练：
#   uv run python src/train/train_v3.py --config configs/keqingv3_default.yaml

data_dirs:
  - processed_v3/ds1
  - processed_v3/ds2

output_dir: artifacts/models/keqingv3

hidden_dim: 256
num_res_blocks: 4
dropout: 0.1

num_epochs: 12
batch_size: 1024
accumulation_steps: 1
learning_rate: 0.0003
weight_decay: 0.0001
warmup_steps: 3000
value_loss_weight: 0.75
score_loss_weight: 0.5
win_loss_weight: 0.3
dealin_loss_weight: 0.3

val_ratio: 0.05
num_workers: 4
log_interval: 200
aug_perms: 2
files_per_epoch_ratio: 0.3
