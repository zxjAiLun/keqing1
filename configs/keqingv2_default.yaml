# keqingv2 训练配置 — Meld Value Ranking Loss
# 预处理：
#   uv run python scripts/preprocess_v2.py --data_dirs artifacts/converted_mjai/ds1 ... --output_dir processed_v2_new/ds1 --workers 16
# NAGA 视角：
#   uv run python scripts/preprocess_v2.py --data_dirs artifacts/converted_mjai/ds7 --output_dir processed_v2_new/ds2 --workers 16 --actor_name_filter 'ⓝNAGA25'
# 训练：
#   uv run python src/train/train_v2.py --config configs/keqingv2_default.yaml
# 从 v1 权重迁移（推荐）：
#   uv run python src/train/train_v2.py --config configs/keqingv2_default.yaml --resume artifacts/models/keqingv1/best.pth --weights-only

data_dirs:
  - processed_v2_new/ds1
  - processed_v2_new/ds2

output_dir: artifacts/models/keqingv2

hidden_dim: 256
num_res_blocks: 4
dropout: 0.1

num_epochs: 10
batch_size: 2048
accumulation_steps: 1
learning_rate: 0.0003
weight_decay: 0.0001
warmup_steps: 5000
value_loss_weight: 0.5

# Meld Value Ranking Loss 参数
rank_loss_weight: 0.1    # 建议先用 0.1，观察 rank_loss 收敛后可调至 0.3
rank_margin: 0.1         # value head 输出量级约 ±0.5，margin 0.05 较保守
rank_loss_every_n: 4     # 每 N batch 计算一次 rank loss，降低 CPU encode 开销

aug_perms: 1
val_ratio: 0.05
num_workers: 8
log_interval: 200
files_per_epoch_ratio: 0.3  # 每 epoch 随机抽取 30% 训练文件，加快迭代速度
