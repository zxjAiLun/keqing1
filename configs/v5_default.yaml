# v5model 默认训练配置
# 针对 4060 Laptop (16G VRAM + 16G RAM + i7-12700H)

# 全量数据 ds1-ds13
data_dirs:
  - artifacts/converted_mjai/ds1
  - artifacts/converted_mjai/ds2
  - artifacts/converted_mjai/ds3
  - artifacts/converted_mjai/ds4
  - artifacts/converted_mjai/ds5
  - artifacts/converted_mjai/ds6
  - artifacts/converted_mjai/ds7
  - artifacts/converted_mjai/ds8
  - artifacts/converted_mjai/ds9
  - artifacts/converted_mjai/ds10
  - artifacts/converted_mjai/ds11
  - artifacts/converted_mjai/ds12
  - artifacts/converted_mjai/ds13

output_dir: artifacts/models/modelv5

# 模型结构
hidden_dim: 256
num_res_blocks: 4
dropout: 0.1

# 训练超参
num_epochs: 20
batch_size: 1024           # DataLoader batch size（显存充足，直接用大 batch）
accumulation_steps: 1      # batch 已够大，不需要梯度累积
learning_rate: 0.0003
weight_decay: 0.0001
warmup_steps: 500
value_loss_weight: 0.5

# 每 epoch 预估步数（用于 cosine decay 计算，可根据实际调整）
steps_per_epoch: 5000

# 验证集比例
val_ratio: 0.05

# DataLoader workers（i7-12700H 20线程，留4给主进程和系统）
num_workers: 4

# 日志打印间隔（step 数）
log_interval: 200
