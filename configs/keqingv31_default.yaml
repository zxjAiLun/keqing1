# keqingv31 default config
# Default should match the current trainable/continuable keqingv4 stable line.

data_dirs:
  - processed_v3/ds1
  - processed_v3/ds2

output_dir: artifacts/models/keqingv31
device: cuda

hidden_dim: 256
num_res_blocks: 5
action_embed_dim: 48
dropout: 0.1

num_epochs: 12
batch_size: 1024
accumulation_steps: 1
learning_rate: 0.0002
weight_decay: 0.0001
warmup_steps: 3000
val_ratio: 0.05
num_workers: 0
buffer_size: 256
prefetch_factor: 2
pin_memory: false
persistent_workers: false
log_interval: 100
aug_perms: 0
files_per_epoch_ratio: 1.0

value_loss_weight: 0.8
score_loss_weight: 0.45
win_loss_weight: 0.25
dealin_loss_weight: 0.25
offense_loss_weight: 0.3
defense_loss_weight: 0.3
gate_reg_weight: 0.005
win_pos_weight: 2.0
dealin_pos_weight: 4.0
