# Xmodel1 discard-first 默认训练配置
data_dirs:
  - processed_xmodel1/ds1

output_dir: artifacts/models/xmodel1
device: cuda

state_tile_channels: 57
state_scalar_dim: 64
candidate_feature_dim: 21
candidate_flag_dim: 10

hidden_dim: 256
num_res_blocks: 4
dropout: 0.1

num_epochs: 8
batch_size: 256
learning_rate: 0.0003
weight_decay: 0.0001
warmup_steps: 1000
steps_per_epoch: 1000

val_ratio: 0.05
num_workers: 2
buffer_size: 512
log_interval: 100

ce_loss_weight: 1.0
rank_loss_weight: 0.5
hard_bad_loss_weight: 0.25
value_loss_weight: 0.5
score_delta_loss_weight: 0.25
win_loss_weight: 0.2
dealin_loss_weight: 0.2
offense_quality_loss_weight: 0.3
ranking_temperature: 1.0
