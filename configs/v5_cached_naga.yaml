# NAGA 专项训练配置
# ds1-ds6 全视角 + ds7 仅 NAGA 视角
# 预处理：
#   uv run python scripts/preprocess_cached.py --data_dirs artifacts/converted_mjai/ds1 ... ds6 --output_dir processed --workers 16
#   uv run python scripts/preprocess_cached.py --data_dirs artifacts/converted_mjai/ds7 --output_dir processed_naga --workers 16 --actor_name_filter "ⓝNAGA25"
# 训练：
#   uv run python src/train/train_v5.py --config configs/v5_cached_naga.yaml

data_dirs:
  - processed/ds1
  - processed/ds2
  - processed/ds3
  - processed/ds4
  - processed/ds5
  - processed/ds6
  - processed_naga/ds7

use_cached: true
aug_perms: 2

output_dir: artifacts/models/modelv5_naga

hidden_dim: 256
num_res_blocks: 4
dropout: 0.1

num_epochs: 20
batch_size: 1024
accumulation_steps: 1
learning_rate: 0.0003
weight_decay: 0.0001
warmup_steps: 2000
value_loss_weight: 0.1

val_ratio: 0.05
num_workers: 8
log_interval: 200
