# keqingv4 alpha bootstrap config
# initial alpha may still reuse v3 cache contract for fast architecture iteration

data_dirs:
  - processed_v3/ds1

output_dir: artifacts/models/keqingv4
device: cuda

hidden_dim: 320
num_res_blocks: 6
action_embed_dim: 64
dropout: 0.1

num_epochs: 12
batch_size: 1024
learning_rate: 0.0003
weight_decay: 0.0001
val_ratio: 0.05
num_workers: 4
files_per_epoch_ratio: 1.0
