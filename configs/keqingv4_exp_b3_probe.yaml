# keqingv4 B3 probe
#
# Purpose:
# - validate whether the new typed comparison + opportunity-aware weighting
#   actually moves special-action behavior before any larger run
# - keep cost small enough for fast iteration
# - this probe keeps historical loss weights for comparison; it is not the
#   current default keqingv4 training config

data_dirs:
  - processed_v4/ds1
  - processed_v4/ds2
  - processed_v4/ds3

output_dir: artifacts/models/keqingv4_b3_probe
device: cuda

hidden_dim: 256
num_res_blocks: 5
action_embed_dim: 48
context_dim: 24
dropout: 0.1

num_epochs: 2
batch_size: 512
accumulation_steps: 1
learning_rate: 0.0002
weight_decay: 0.0001
warmup_steps: 800
val_ratio: 0.05
num_workers: 0
buffer_size: 256
prefetch_factor: 2
pin_memory: false
persistent_workers: false
log_interval: 50
aug_perms: 0
files_per_epoch_ratio: 0.10

value_loss_weight: 0.8
score_loss_weight: 0.45
win_loss_weight: 0.25
dealin_loss_weight: 0.25
offense_loss_weight: 0.3
defense_loss_weight: 0.3
hand_value_loss_weight: 0.2
threat_loss_weight: 0.2
gate_reg_weight: 0.005

typed_rank_loss_weight: 0.20
typed_rank_margin: 0.20
reach_opportunity_weight: 1.75
call_opportunity_weight: 1.5
hora_opportunity_weight: 2.25
chosen_reach_weight: 1.0
chosen_dama_weight: 1.35
chosen_call_weight: 1.0
chosen_none_weight: 1.35
chosen_hora_weight: 1.0
chosen_continue_weight: 1.5

win_pos_weight: 2.0
dealin_pos_weight: 4.0
threat_pos_weight: 4.0
