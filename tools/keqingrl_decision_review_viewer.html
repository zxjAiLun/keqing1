<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KeqingRL Decision Review</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d8dde6;
      --text: #17202a;
      --muted: #667085;
      --accent: #0f766e;
      --warn: #b45309;
      --bad: #b91c1c;
      --good: #047857;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 {
      font-size: 16px;
      margin: 0;
      white-space: nowrap;
    }
    input, select, button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    main {
      display: grid;
      grid-template-columns: 320px minmax(620px, 1.2fr) minmax(420px, 0.8fr);
      min-height: calc(100vh - 58px);
    }
    aside, section {
      border-right: 1px solid var(--line);
      min-width: 0;
    }
    .list {
      height: calc(100vh - 58px);
      overflow: auto;
      background: var(--panel);
    }
    .case {
      width: 100%;
      text-align: left;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 0;
      padding: 10px 12px;
    }
    .case.active {
      background: #e6fffb;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .case-title {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .case-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .content {
      padding: 14px;
      overflow: auto;
      height: calc(100vh - 86px);
    }
    .bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }
    .pill.good { color: var(--good); border-color: #a7f3d0; background: #ecfdf5; }
    .pill.warn { color: var(--warn); border-color: #fed7aa; background: #fff7ed; }
    .pill.bad { color: var(--bad); border-color: #fecaca; background: #fef2f2; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 14px;
    }
    .kv {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 6px 10px;
      font-size: 13px;
    }
    .kv span:nth-child(odd) {
      color: var(--muted);
    }
    .table-board {
      min-height: 520px;
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0.14)),
        #0f6b57;
      border: 1px solid #0a4e41;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), inset 0 0 36px rgba(0,0,0,0.28);
      display: grid;
      grid-template-columns: minmax(118px, 0.65fr) minmax(260px, 1.5fr) minmax(118px, 0.65fr);
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 10px;
    }
    .center-info {
      align-self: center;
      justify-self: center;
      width: 150px;
      min-height: 104px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.88);
      color: #e5e7eb;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.32);
      z-index: 1;
    }
    .seat {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
    }
    .seat.actor {
      outline: 3px solid rgba(20,184,166,0.65);
    }
    .seat0 { grid-column: 2; grid-row: 3; }
    .seat2 { grid-column: 2; grid-row: 1; }
    .seat1 { grid-column: 3; grid-row: 2; align-self: center; }
    .seat3 { grid-column: 1; grid-row: 2; align-self: center; }
    .center-info { grid-column: 2; grid-row: 2; }
    .seat-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #0f172a;
      font-weight: 700;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .seat-label {
      color: #475569;
      font-size: 11px;
      margin-top: 5px;
    }
    .tiles {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tile {
      width: 28px;
      height: 40px;
      border: 1px solid #b8afa0;
      border-radius: 4px;
      background: #fdfaf1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 0 #aaa090, 0 5px 5px rgba(0,0,0,0.25);
      overflow: hidden;
      flex: 0 0 auto;
    }
    .tile.small {
      width: 22px;
      height: 31px;
    }
    .tile.back {
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 7px),
        #16324f;
      border-color: #0f2134;
    }
    .tile img {
      width: calc(100% - 4px);
      height: calc(100% - 4px);
      object-fit: contain;
      display: block;
    }
    .meld {
      display: inline-flex;
      gap: 3px;
      align-items: center;
      padding: 3px;
      border-radius: 5px;
      background: rgba(15,23,42,0.08);
      margin-right: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      text-align: left;
      font-size: 12px;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      background: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr.top-mortal { background: #ecfdf5; }
    tr.top-after { box-shadow: inset 3px 0 0 var(--accent); }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      word-break: break-all;
      overflow-wrap: anywhere;
      min-width: 0;
    }
    .empty {
      color: var(--muted);
      padding: 24px;
    }
    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      .list, .content { height: auto; max-height: none; }
      aside, section { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header>
    <h1>KeqingRL Review</h1>
    <input id="fileInput" type="file" accept=".jsonl,.json">
    <select id="filter">
      <option value="all">All cases</option>
      <option value="selected_changed">Selected changed</option>
      <option value="teacher_disagreement">Teacher disagreement</option>
      <option value="reach_related">Reach</option>
      <option value="kan_related">Kan</option>
      <option value="call_related">Call</option>
    </select>
    <select id="sort">
      <option value="risk">Risk order</option>
      <option value="teacher_margin">Teacher margin</option>
      <option value="case_id">Case id</option>
    </select>
    <button id="loadSample">Load SeedB</button>
    <span id="status" class="pill">No file loaded</span>
  </header>
  <main>
    <aside class="list" id="caseList"></aside>
    <section class="content" id="statePane"><div class="empty">Load a decision_review_cases.jsonl file.</div></section>
    <section class="content" id="actionPane"></section>
  </main>
  <script>
    const state = { cases: [], filtered: [], selected: 0 };
    const samplePath = "../reports/keqingrl_mortal_action_q_imitation_fullscope_adaptive_topk_v2_iter4_seedB_ep32_memmon_review_cases/decision_review_cases.jsonl";
    const tileBase = "../tiles/riichi-mahjong-tiles/Regular";
    const tileSvg = {
      "1m": "Man1", "2m": "Man2", "3m": "Man3", "4m": "Man4", "5m": "Man5", "6m": "Man6", "7m": "Man7", "8m": "Man8", "9m": "Man9",
      "1p": "Pin1", "2p": "Pin2", "3p": "Pin3", "4p": "Pin4", "5p": "Pin5", "6p": "Pin6", "7p": "Pin7", "8p": "Pin8", "9p": "Pin9",
      "1s": "Sou1", "2s": "Sou2", "3s": "Sou3", "4s": "Sou4", "5s": "Sou5", "6s": "Sou6", "7s": "Sou7", "8s": "Sou8", "9s": "Sou9",
      "5mr": "Man5-Dora", "5pr": "Pin5-Dora", "5sr": "Sou5-Dora",
      "E": "Ton", "S": "Nan", "W": "Shaa", "N": "Pei", "P": "Haku", "F": "Hatsu", "C": "Chun"
    };
    const tileIdToName = ["1m","2m","3m","4m","5m","6m","7m","8m","9m","1p","2p","3p","4p","5p","6p","7p","8p","9p","1s","2s","3s","4s","5s","6s","7s","8s","9s","E","S","W","N","P","F","C"];
    const $ = (id) => document.getElementById(id);
    const safe = (value) => value === undefined || value === null || value === "" ? "-" : String(value);
    const fixed = (value) => typeof value === "number" && Number.isFinite(value) ? value.toFixed(3) : "-";
    const html = (value) => safe(value).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[ch]));

    $("fileInput").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      loadText(await file.text(), file.name);
    });
    $("filter").addEventListener("change", render);
    $("sort").addEventListener("change", render);
    $("loadSample").addEventListener("click", async () => {
      await loadSample();
    });
    if (new URLSearchParams(window.location.search).get("sample") === "1") {
      loadSample();
    }

    async function loadSample() {
      try {
        const response = await fetch(samplePath);
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        loadText(await response.text(), samplePath);
      } catch (error) {
        $("status").textContent = "Sample fetch failed; use file picker";
        console.error(error);
      }
    }

    function loadText(text, label) {
      state.cases = text.split(/\r?\n/).filter(Boolean).map((line) => JSON.parse(line));
      state.selected = 0;
      $("status").textContent = `${state.cases.length} cases: ${label}`;
      render();
    }

    function render() {
      const filter = $("filter").value;
      state.filtered = state.cases.filter((item) => filter === "all" || String(item.review_reason || "").includes(filter));
      state.filtered.sort(sorter($("sort").value));
      if (state.selected >= state.filtered.length) state.selected = 0;
      renderList();
      renderCase(state.filtered[state.selected]);
    }

    function sorter(mode) {
      if (mode === "case_id") return (a, b) => String(a.case_id).localeCompare(String(b.case_id));
      if (mode === "teacher_margin") return (a, b) => teacherMargin(b) - teacherMargin(a);
      return (a, b) => riskScore(b) - riskScore(a);
    }

    function riskScore(item) {
      const reason = String(item.review_reason || "");
      return (item.selected_changed && item.teacher_disagreed ? 100 : 0)
        + (reason.includes("kan_related") ? 40 : 0)
        + (reason.includes("call_related") ? 30 : 0)
        + (reason.includes("reach_related") ? 25 : 0)
        + (reason.includes("teacher_disagreement") ? 10 : 0)
        + teacherMargin(item);
    }

    function teacherMargin(item) {
      const scores = (item.legal_actions || [])
        .map((action) => action.mortal_q)
        .filter((value) => typeof value === "number")
        .sort((a, b) => b - a);
      return scores.length >= 2 ? scores[0] - scores[1] : 0;
    }

    function renderList() {
      const list = $("caseList");
      if (!state.filtered.length) {
        list.innerHTML = "<div class='empty'>No cases match this filter.</div>";
        return;
      }
      list.innerHTML = state.filtered.map((item, index) => `
        <button class="case ${index === state.selected ? "active" : ""}" data-index="${index}">
          <div class="case-title">${html(item.case_id)}</div>
          <div class="case-meta">${html(item.review_reason)} | ${html(item.row_scope)} | step ${html(item.step_id)}</div>
          <div class="case-meta">before ${actionName(item, "is_student_before_top1")} -> after ${actionName(item, "is_student_after_top1")} | Mortal ${actionName(item, "is_mortal_top1")}</div>
        </button>`).join("");
      list.querySelectorAll(".case").forEach((button) => {
        button.addEventListener("click", () => {
          state.selected = Number(button.dataset.index);
          render();
        });
      });
    }

    function renderCase(item) {
      if (!item) {
        $("statePane").innerHTML = "<div class='empty'>No case selected.</div>";
        $("actionPane").innerHTML = "";
        return;
      }
      $("statePane").innerHTML = `
        <div class="bar">
          ${pill(item.selected_changed, "selected changed")}
          ${pill(item.teacher_disagreed, "teacher disagreed")}
          ${reasonPills(item.review_reason)}
        </div>
        <div class="panel">
          <h2>Decision</h2>
          <div class="kv">
            <span>case</span><code>${html(item.case_id)}</code>
            <span>run</span><span>${html(item.run_id)}</span>
            <span>actor</span><span>${html(item.actor)}</span>
            <span>scope</span><span>${html(item.row_scope)}</span>
            <span>before</span><code>${html(item.selected_before)}</code>
            <span>after</span><code>${html(item.selected_after)}</code>
            <span>Mortal</span><code>${html(item.teacher_top1)}</code>
            <span>rulebase</span><code>${html(item.rulebase_top1)}</code>
          </div>
        </div>
        <div class="panel">
          <h2>Round</h2>
          ${kv(item.round_state || {})}
        </div>
        <div class="panel">
          <h2>Table</h2>
          ${mahjongTable(item)}
        </div>
        <div class="panel">
          <h2>Replay Hint</h2>
          ${kv(item.replay_hint || {})}
        </div>`;
      $("actionPane").innerHTML = actionTable(item);
    }

    function pill(on, label) {
      return `<span class="pill ${on ? "warn" : "good"}">${on ? "" : "not "}${html(label)}</span>`;
    }

    function reasonPills(reason) {
      return String(reason || "").split(",").filter(Boolean).map((part) => `<span class="pill">${html(part)}</span>`).join("");
    }

    function kv(obj) {
      return `<div class="kv">${Object.entries(obj).map(([key, value]) => `<span>${html(key)}</span><span>${html(formatValue(value))}</span>`).join("")}</div>`;
    }

    function formatValue(value) {
      if (Array.isArray(value) || typeof value === "object") return JSON.stringify(value);
      return value;
    }

    function mahjongTable(item) {
      const players = item.players || [];
      const bySeat = new Map(players.map((player) => [Number(player.seat), player]));
      const round = item.round_state || {};
      return `<div class="table-board">
        <div class="center-info">
          <div>
            <strong>${html(round.bakaze)}${html(round.kyoku)}局 ${html(round.honba)}本场</strong>
            <div class="case-meta">立直棒 ${html(round.riichi_sticks)} | 余 ${html(round.wall_remaining)}</div>
            <div class="case-meta">宝牌</div>
            ${tiles(round.dora_indicators, { small: true })}
          </div>
        </div>
        ${[0, 1, 2, 3].map((seat) => tableSeat(bySeat.get(seat) || { seat }, seat)).join("")}
      </div>`;
    }

    function tableSeat(player, seat) {
      return `<div class="seat seat${seat} ${player.is_actor ? "actor" : ""}">
        <div class="seat-head">
          <span>Seat ${html(seat)} ${player.is_actor ? "(actor)" : ""}</span>
          <span>${html(player.score)} ${player.riichi ? "立直" : ""}</span>
        </div>
        <div class="seat-label">手牌</div>
        ${player.is_actor || (player.hand || []).length ? tiles(player.hand) : tileBacks(13)}
        <div class="seat-label">河</div>
        ${tiles(player.discards, { small: true })}
        <div class="seat-label">副露</div>
        ${melds(player.melds)}
      </div>`;
    }

    function tiles(values, options = {}) {
      const list = Array.isArray(values) ? values : [];
      if (!list.length) return "<div class='tiles'><span class='pill'>empty</span></div>";
      return `<div class="tiles">${list.map((tile) => tileImage(tileValue(tile), options)).join("")}</div>`;
    }

    function tileBacks(count) {
      return `<div class="tiles">${Array.from({ length: count }, () => `<span class="tile back"></span>`).join("")}</div>`;
    }

    function melds(values) {
      const list = Array.isArray(values) ? values : [];
      if (!list.length) return "<div class='tiles'><span class='pill'>empty</span></div>";
      return `<div class="tiles">${list.map((meld) => {
        const tilesInMeld = [
          ...(Array.isArray(meld.consumed) ? meld.consumed : []),
          meld.pai,
        ].map(tileValue).filter(Boolean);
        return `<span class="meld">${tilesInMeld.map((tile) => tileImage(tile, { small: true })).join("")}</span>`;
      }).join("")}</div>`;
    }

    function tileValue(value) {
      if (value === undefined || value === null) return "";
      if (typeof value === "string" || typeof value === "number") return String(value);
      if (typeof value === "object") return tileValue(value.pai ?? value.tile ?? value.name ?? "");
      return String(value);
    }

    function tileImage(tile, options = {}) {
      const code = normalizeTile(tile);
      const name = tileSvg[code];
      const sizeClass = options.small ? " small" : "";
      if (!name) return `<span class="tile${sizeClass}">${html(code || "?")}</span>`;
      return `<span class="tile${sizeClass}" title="${html(code)}"><img src="${tileBase}/${name}.svg" alt="${html(code)}"></span>`;
    }

    function normalizeTile(tile) {
      const text = String(tile || "");
      if (/^\d+$/.test(text) && Number(text) >= 0 && Number(text) < tileIdToName.length) return tileIdToName[Number(text)];
      if (text === "5M" || text === "5mr") return "5mr";
      if (text === "5P" || text === "5pr") return "5pr";
      if (text === "5S" || text === "5sr") return "5sr";
      return text;
    }

    function actionTable(item) {
      const rows = item.legal_actions || [];
      return `<table>
        <thead><tr>
          <th>#</th><th>Action</th><th>Rule</th><th>Mortal Q</th><th>Teacher P</th><th>Before</th><th>After</th><th>Ranks</th><th>Flags</th>
        </tr></thead>
        <tbody>${rows.map((action) => `
          <tr class="${action.is_mortal_top1 ? "top-mortal" : ""} ${action.is_student_after_top1 ? "top-after" : ""}">
            <td>${html(action.index)}</td>
            <td><strong>${html(action.type)}</strong><br>${tileImage(action.pai || tileFromCanonical(action.canonical_key), { small: true })}<br><code title="${html(action.canonical_key)}">${html(shortKey(action.canonical_key))}</code></td>
            <td>${fixed(action.rulebase_score)}</td>
            <td>${fixed(action.mortal_q)}</td>
            <td>${fixed(action.teacher_prob)}</td>
            <td>${fixed(action.student_before_score)}</td>
            <td>${fixed(action.student_after_score)}</td>
            <td>R ${html(action.rulebase_rank)} / M ${html(action.teacher_rank)} / B ${html(action.student_before_rank)} / A ${html(action.student_after_rank)}</td>
            <td>${flags(action)}</td>
          </tr>`).join("")}</tbody>
      </table>`;
    }

    function actionName(item, flag) {
      const action = (item.legal_actions || []).find((entry) => entry[flag]);
      return action ? action.type + (action.pai ? ` ${action.pai}` : "") : "-";
    }

    function shortKey(key) {
      const text = String(key || "");
      return text.length > 34 ? text.slice(0, 34) + "..." : text;
    }

    function tileFromCanonical(key) {
      const match = String(key || "").match(/tile=([^|]+)/);
      if (!match || match[1] === "-1") return "";
      return match[1];
    }

    function flags(action) {
      const names = [];
      if (action.is_rulebase_top1) names.push("rule");
      if (action.is_mortal_top1) names.push("Mortal");
      if (action.is_student_before_top1) names.push("before");
      if (action.is_student_after_top1) names.push("after");
      return names.map((name) => `<span class="pill">${html(name)}</span>`).join(" ");
    }
  </script>
</body>
</html>
