name: Mortal mainline verify

on:
  push:
    branches:
      - main
      - mortal-mainline-cleanup
      - codex/mortal-encoding-mainline
  pull_request:
    branches:
      - main

jobs:
  python:
    name: Python default tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run default pytest suite
        run: uv run python -m pytest -q

  replay-ui:
    name: Replay UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/replay_ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/replay_ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
